version: '3.8'

services:
  # Banco de Dados Relacional (Substituindo o SQLite)
  postgres:
    image: postgres:15-alpine
    container_name: sgdop-postgres
    environment:
      POSTGRES_USER: adriano
      POSTGRES_PASSWORD: senha_secreta_diarias
      POSTGRES_DB: sgdop_nuvem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rede-nuvem

  # Broker de Mensageria (Para o fluxo assíncrono do item 4)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sgdop-rabbitmq
    ports:
      - "5672:5672"   # Porta do protocolo AMQP (mensageria)
      - "15672:15672" # Painel administrativo visual do RabbitMQ
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - rede-nuvem

  # Coletor de Métricas (Item 6)
  prometheus:
    image: prom/prometheus:latest
    container_name: sgdop-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Permite que o Prometheus enxergue o NestJS local
    networks:
      - rede-nuvem

  # Painel de Monitoramento Visual (Item 7)
  grafana:
    image: grafana/grafana:latest
    container_name: sgdop-grafana
    ports:
      - "3001:3000" # Acessaremos em http://localhost:3001
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - rede-nuvem

volumes:
  postgres_data:

networks:
  rede-nuvem:
    driver: bridge